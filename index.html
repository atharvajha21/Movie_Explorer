<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>🎬 Movie <span>Explorer</span></h1>
    <div id="controls">
      <input type="text" id="searchInput" placeholder="Search movies..." />
      <button id="searchBtn">Search</button>
      <select id="filterType">
        <option value="">All Types</option>
        <option value="movie">Movies</option>
        <option value="series">TV Series</option>
        <option value="episode">Episodes</option>
      </select>
      <button id="watchlistBtn">Watchlist (<span id="watchlistCount">0</span>)</button>
    </div>
  </header>

  <!-- MOVIE GRID -->
  <main id="moviesContainer"></main>

  <!-- EMPTY STATE -->
  <p id="emptyMsg" class="hidden">No movies found. Try a different search.</p>

  <!-- WATCHLIST PANEL -->
  <div id="watchlistPanel" class="hidden">
    <div id="watchlistBox">
      <h2>My Watchlist</h2>
      <button id="closeWatchlist">Close</button>
      <div id="watchlistContent"></div>
    </div>
  </div>

  <footer>
    <p>Movie Explorer | Powered by <a href="https://www.omdbapi.com/" target="_blank">OMDb API</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
